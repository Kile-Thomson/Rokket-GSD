name: Release VSIX

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's version bump or docs-only commits
    if: "!contains(github.event.head_commit.message, 'chore: bump version to') && !startsWith(github.event.head_commit.message, 'docs:')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Check if a release already exists for this version
          EXISTING=$(gh release view "v${CURRENT}" --json tagName 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

            node -e "
              const pkg = require('./package.json');
              pkg.version = '${NEW_VERSION}';
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
            "

            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Bumped version: ${CURRENT} → ${NEW_VERSION}"
          else
            echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Using current version: ${CURRENT}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous release tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          VERSION="${{ steps.version.outputs.version }}"

          # Generate changelog using commit subjects + bodies
          # Format: subject as bold list item, body lines as sub-details
          python3 - "$PREV_TAG" "$VERSION" <<'PYEOF'
import subprocess, sys, re

prev_tag, version = sys.argv[1], sys.argv[2]

# Get commits with subject and body separated by a delimiter
result = subprocess.run(
    ["git", "log", f"{prev_tag}..HEAD", "--no-merges", "--pretty=format:%s%n%b%n---COMMIT_END---"],
    capture_output=True, text=True
)

features, fixes, changed, other = [], [], [], []

for block in result.stdout.split("---COMMIT_END---"):
    lines = [l for l in block.strip().splitlines() if l.strip()]
    if not lines:
        continue

    subject = lines[0].strip()
    body_lines = [l.strip() for l in lines[1:] if l.strip()]

    # Skip version bumps and merge commits
    if re.match(r"^chore:?\s*bump version", subject, re.I):
        continue
    if re.match(r"^chore\(release\)", subject, re.I):
        continue
    if subject.startswith("Merge "):
        continue

    # Determine category and clean subject
    if re.match(r"^feat", subject, re.I):
        clean = re.sub(r"^feat[^:]*:\s*", "", subject)
        target = features
    elif re.match(r"^fix", subject, re.I):
        clean = re.sub(r"^fix[^:]*:\s*", "", subject)
        target = fixes
    elif re.match(r"^refactor|^perf|^style", subject, re.I):
        clean = re.sub(r"^[a-z]+[^:]*:\s*", "", subject)
        target = changed
    else:
        clean = re.sub(r"^[a-z]+[^:]*:\s*", "", subject)
        target = other

    # Build entry: bold title + body as description
    entry = f"- **{clean[0].upper() + clean[1:]}**"
    if body_lines:
        # Use body as description, joining short lines
        desc = " ".join(body_lines)
        # Trim very long descriptions
        if len(desc) > 200:
            desc = desc[:197] + "..."
        entry += f" — {desc}"

    target.append(entry)

# Build release notes
sections = []
title = f"## v{version}\n"
sections.append(title)

if features:
    sections.append("### Added\n" + "\n".join(features))
if fixes:
    sections.append("### Fixed\n" + "\n".join(fixes))
if changed:
    sections.append("### Changed\n" + "\n".join(changed))
if other:
    sections.append("### Other\n" + "\n".join(other))

if len(sections) == 1:
    sections.append("Maintenance release — no notable changes.")

notes = "\n\n".join(sections) + "\n"

with open("/tmp/release-notes.md", "w") as f:
    f.write(notes)
PYEOF

          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}" \
            *.vsix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
