name: Release VSIX

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's version bump or docs-only commits
    if: "!contains(github.event.head_commit.message, 'chore: bump version to') && !startsWith(github.event.head_commit.message, 'docs:')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Check if a release already exists for this version
          EXISTING=$(gh release view "v${CURRENT}" --json tagName 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

            node -e "
              const pkg = require('./package.json');
              pkg.version = '${NEW_VERSION}';
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
            "

            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Bumped version: ${CURRENT} → ${NEW_VERSION}"
          else
            echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Using current version: ${CURRENT}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create tag and release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            *.vsix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
