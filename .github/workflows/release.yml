name: Release VSIX

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's version bump or docs-only commits
    if: "!contains(github.event.head_commit.message, 'chore: bump version to') && !startsWith(github.event.head_commit.message, 'docs:')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Check if a release already exists for this version
          EXISTING=$(gh release view "v${CURRENT}" --json tagName 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

            node -e "
              const pkg = require('./package.json');
              pkg.version = '${NEW_VERSION}';
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
            "

            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Bumped version: ${CURRENT} → ${NEW_VERSION}"
          else
            echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Using current version: ${CURRENT}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous release tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          # Collect commits since last release, categorize by conventional commit type
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            # Strip leading whitespace
            line=$(echo "$line" | sed 's/^[[:space:]]*//')
            [ -z "$line" ] && continue

            # Extract subject (remove hash prefix if present)
            subject=$(echo "$line" | sed 's/^[a-f0-9]* //')

            # Skip version bump commits
            echo "$subject" | grep -qi "^chore: bump version" && continue
            echo "$subject" | grep -qi "^chore(release)" && continue

            # Categorize
            if echo "$subject" | grep -qi "^feat"; then
              clean=$(echo "$subject" | sed 's/^feat[^:]*: //')
              FEATURES="${FEATURES}- ${clean}\n"
            elif echo "$subject" | grep -qi "^fix"; then
              clean=$(echo "$subject" | sed 's/^fix[^:]*: //')
              FIXES="${FIXES}- ${clean}\n"
            else
              clean=$(echo "$subject" | sed 's/^[a-z]*[^:]*: //')
              OTHER="${OTHER}- ${clean}\n"
            fi
          done <<< "$(git log "${PREV_TAG}..HEAD" --pretty=format:"%h %s" --no-merges)"

          # Build release notes
          NOTES=""
          if [ -n "$FEATURES" ]; then
            NOTES="${NOTES}### ✨ New\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}### 🐛 Fixes\n${FIXES}\n"
          fi
          if [ -n "$OTHER" ]; then
            NOTES="${NOTES}### 📦 Other\n${OTHER}\n"
          fi

          if [ -z "$NOTES" ]; then
            NOTES="Maintenance release — no notable changes."
          fi

          # Write to file for the release step (avoids shell escaping issues)
          printf "%b" "$NOTES" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}" \
            *.vsix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
